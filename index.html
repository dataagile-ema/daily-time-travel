/* =========================================================
   TIDSRESAN v19 — VALPIL KORT → PLATS (f.d. v18_valpil)
   Som v18, men vid val ritas en linje från det valda kortet
   till platsen på axeln dit resan går (som i tidiga versioner)
   — valet styr vart vi åker. Linjen tonar ut efter resan.
   Centrum-texten bär ALLTID plakettens bläckblå färg (den hör
   ihop med spelaren) och innehåller alltid händelsen + året
   där spelaren står just nu. Statusen ("Du är här!", "Rätt
   håll! 2 steg kvar.") står ovanför positionsraden.
   Bas: v18 — SPELARENS CENTRUM
   Som v17, men feedback-raden är spelarens fasta centrum: där
   står ALLTID en instruktion (grön/röd), och "Du är här!" bor
   där vid spelstart — med en bläckkurva som ritas från texten
   till plaketten på axeln (samma formspråk som svarslinjerna).
   Frågan står alltid direkt under. Marginalnoten är borttagen.
   Fixar från Niklas test: kompaktare plakett som ryms i rännan
   före korten (f.Kr tappar timglaset på mobil), större text i
   resebandet, kandidatetiketter viker även för "Du är här!"-
   noten, och en dator-läge (>=700px) med bredare spelyta.
   ---------------------------------------------------------
   Bas: v16_right_space — OMDISPONERAD YTA
   Som v16_right, men reseband + räknare bor i spelkolumnen
   (den tomma ytan runt knapparna) i stället för i sidhuvudet.
   Tidslinjen sträcker sig därmed nästan hela skärmhöjden och
   får fler skalstreck; målskylten sitter som vägvisare på
   linjens topp.
   Som v16, men plaketten ligger alltid till höger om axeln med
   pilen pekande mot sin punkt — ingen dodge-logik behövs, och
   kandidatplatserna på axeln är aldrig skymda.
   Som v15_year, men med en lekfull handskriven "Du är här!"-
   marginalnot med svängd pil som gungar ovanför plaketten,
   samt större timglas i plaketten.
   Bygger på v15. Det stora "Du befinner dig i"-fönstret är
   borttaget: resenärsplaketten på tidsaxeln bär i stället
   det aktuella årtalet, och året rullar i plaketten medan
   symbolen reser. Ett ställe för "var är jag" — ingen
   duplicering.
   ---------------------------------------------------------
   Ursprunglig bas: v12 — NY DESIGN 1 · MOBIL
   Samma spelmotor som v12 (helt orörd). Visuell riktning
   "Kartografens journal" behållen, men omproportionerad
   för telefon: större text, större tryckytor, tydligare
   tidsaxel-rail och ett stort, lugnt årtalsfönster.
   ========================================================= */
:root{
  --bg:#e9dec4;
  --paper:#f5eeda;
  --paper-2:#efe6cd;
  --ink:#241c10;
  --text:#241c10;
  --text-dim:#5f4f37;
  --text-faint:#8a7856;
  --accent:#1c5a66;
  --accent-dim:#123f47;
  --accent-glow:rgba(28,90,102,.16);
  --accent-glow-strong:rgba(28,90,102,.34);
  --gilt:#976b12;
  --gilt-glow:rgba(151,107,18,.5);
  --seal:#9c3a28;
  --spark:#976b12;
  --spark-glow:rgba(151,107,18,.5);
  --correct:#3c6f44;
  --correct-dim:#2c5433;
  --correct-soft:rgba(60,111,68,.14);
  --correct-glow:rgba(60,111,68,.32);
  --wrong:#a83c24;
  --wrong-dim:#832e1a;
  --wrong-soft:rgba(168,60,36,.12);
  --wrong-glow:rgba(168,60,36,.3);
  --border:rgba(36,28,16,.16);
  --border-hover:rgba(36,28,16,.34);
  --border-accent:rgba(28,90,102,.5);
  --display:'Fraunces',Georgia,serif;
  --ui:'Karla',system-ui,sans-serif;
  --mono:'Courier Prime',ui-monospace,monospace;
  --shadow:3px 3px 0 rgba(36,28,16,.14);
  --radius:8px;
  --radius-lg:12px;
  --tl-bottom:12vh;/* TEST: tidslinjens bottenmarginal = styr även Next-knappens höjd */
}
/* TEST: korta skärmar — mindre bottenmarginal så Next-knappen inte krockar med korten */
@media (max-height:800px){:root{--tl-bottom:6vh}}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{
  font-family:var(--ui);color:var(--text);background:var(--bg);
  min-height:100dvh;display:flex;justify-content:center;
  -webkit-text-size-adjust:100%;text-rendering:optimizeLegibility;
}
body{
  background:
    radial-gradient(ellipse 150% 120% at 50% 45%, transparent 52%, rgba(88,66,35,.22) 100%),
    radial-gradient(ellipse 120% 80% at 50% 0%, rgba(255,250,235,.7) 0%, transparent 60%),
    repeating-linear-gradient(0deg, transparent 0 33px, rgba(36,28,16,.045) 33px 34px),
    repeating-linear-gradient(90deg, transparent 0 33px, rgba(36,28,16,.045) 33px 34px),
    var(--bg);
  transition:background .5s;
}
body::after{
  content:'';position:fixed;inset:0;opacity:.05;pointer-events:none;z-index:40;mix-blend-mode:multiply;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
  background-size:256px 256px;
}
#app.shake{animation:shake .4s}
@keyframes shake{0%,100%{transform:none}20%{transform:translateX(-5px)}40%{transform:translateX(4px)}60%{transform:translateX(-3px)}80%{transform:translateX(2px)}}

.ember{position:fixed;bottom:-6px;border-radius:50%;background:var(--gilt);pointer-events:none;z-index:0;
  opacity:0;animation:emberRise linear infinite}
@keyframes emberRise{
  0%{opacity:0;transform:translateY(0) scale(.6)}
  8%{opacity:.32}
  92%{opacity:.1}
  100%{opacity:0;transform:translateY(-100vh) scale(1.1)}
}

#app{width:100%;max-width:440px;min-height:100dvh;
  padding:calc(14px + env(safe-area-inset-top)) 16px calc(20px + env(safe-area-inset-bottom));
  display:flex;flex-direction:column;position:relative;z-index:2}
.screen-fade{animation:screenIn .45s ease both}
@keyframes screenIn{from{opacity:0}to{opacity:1}}
.fade-in{animation:fadeIn .5s ease both}
@keyframes fadeIn{from{opacity:0;transform:translateY(9px)}to{opacity:1;transform:none}}
.fade-in-d1{animation:fadeIn .5s ease .08s both}
.fade-in-d2{animation:fadeIn .5s ease .16s both}
.fade-in-d3{animation:fadeIn .5s ease .24s both}

header{text-align:center;margin-bottom:8px}
header h1{
  font-family:var(--display);font-style:italic;font-weight:800;font-size:2.15rem;letter-spacing:-.01em;
  color:var(--ink);line-height:1;
  font-variation-settings:'opsz' 90;
}
header h1::after{
  content:'✦';display:block;font-style:normal;font-size:.55rem;color:var(--gilt);
  letter-spacing:.6em;margin-top:4px;opacity:.85;
}
.day-lab{font-size:.68rem;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:var(--seal);margin-top:6px;font-family:var(--mono)}

/* Reseband: två fält, tydliga, tillåts brytas till två rader i stället
   för att kapas — viktigare med läsbarhet än snygg avklippning på mobil */
/* Mobil: staplat band — händelsetexten får hela bredden, målraden under */
.journey-banner{display:flex;flex-direction:column;gap:7px;
  padding:10px 13px;background:var(--paper);border:1.5px dashed var(--border-hover);border-radius:var(--radius);
  box-shadow:var(--shadow)}
.journey-banner .jb-side{flex:1;min-width:0}
.journey-banner .jb-start{display:flex;flex-direction:column;justify-content:center}
.journey-banner .jb-label{font-size:.6rem;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:var(--text-faint);font-family:var(--mono);margin-bottom:3px}
.journey-banner .jb-event{font-size:.92rem;font-weight:600;color:var(--ink);line-height:1.3;
  display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.journey-banner .jb-arrow{display:none;align-items:center;color:var(--seal);opacity:.85;flex-shrink:0;font-size:1.05rem}
/* Målet är ett ÅRTAL att nå — inte en namngiven händelse (annars avslöjas
   sista svaret gratis). Sätts som ett tydligt förseglat årtalsmärke. */
.journey-banner .jb-end{flex:0 0 auto;display:flex;flex-direction:row;align-items:center;justify-content:flex-end;gap:8px;text-align:right}
.journey-banner .jb-end .jb-label{margin-bottom:0}
.journey-banner .jb-end .jb-label{color:var(--seal)}
.journey-banner .jb-year{font-family:var(--mono);font-weight:700;font-size:1.18rem;line-height:1;color:var(--seal);letter-spacing:.01em;white-space:nowrap;
  padding:5px 10px;border:1.5px solid rgba(156,58,40,.5);border-radius:7px;
  background:rgba(156,58,40,.08);box-shadow:1px 1px 0 rgba(36,28,16,.13),inset 0 1px 0 rgba(255,235,220,.35)}
.meta{display:flex;justify-content:center;flex-wrap:wrap;gap:5px 12px;font-size:.7rem;color:var(--text-dim);margin-top:9px;font-family:var(--mono)}
.meta b{color:var(--ink);font-weight:700}
.meta .streak-chip b{color:var(--gilt)}
.meta .streak-chip.pop{animation:chipPop .4s}
@keyframes chipPop{40%{transform:scale(1.3)}}

.board{position:relative;display:flex;gap:8px;flex:1;min-height:0;margin-top:6px}
.connector-svg{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;z-index:15;overflow:visible}
.conn-path{fill:none;stroke-width:2.4;opacity:0;filter:drop-shadow(0 1px 1px rgba(36,28,16,.2))}
.conn-path.correct{stroke:var(--correct);color:var(--correct)}
.conn-path.wrong{stroke:var(--wrong);color:var(--wrong)}
.conn-path.melink{stroke:var(--accent);color:var(--accent)}
.conn-path.dim{stroke:var(--text-faint);color:var(--text-faint);opacity:0!important}
.conn-path.show{opacity:.85;transition:opacity .35s ease}
.conn-path.fade-out{opacity:0!important;transition:opacity .6s ease}

/* ---- Vertikal tidsaxel = tydlig expeditionsrail i papperskanten ---- */
.axis-col{position:relative;width:112px;flex:none;margin:8px 0 var(--tl-bottom);/* TEST: topp 8px; nedskalad tidslinje + bottenmarginal (--tl-bottom) */
  background:linear-gradient(90deg,rgba(245,238,218,.75) 0%,rgba(245,238,218,.35) 70%,transparent 100%);
  border-radius:var(--radius) 0 0 var(--radius)}
.axis-line{position:absolute;left:40px;top:0;bottom:0;width:2.5px;border-radius:2px;
  background:repeating-linear-gradient(180deg,var(--ink) 0 7px,transparent 7px 14px);
  opacity:.5;
  transform-origin:bottom;animation:growLine .8s cubic-bezier(.3,.7,.3,1) both}
@keyframes growLine{from{transform:scaleY(0)}}
.axis-tick{position:absolute;left:33px;width:15px;height:1.5px;background:var(--border-hover);animation:fadeIn .5s .4s both}
.axis-tick-lab{position:absolute;left:0;width:30px;text-align:right;transform:translateY(-50%);
  font-family:var(--mono);font-size:.62rem;font-weight:700;color:var(--text-faint);line-height:1.15;animation:fadeIn .5s .5s both}

/* Mål: rött vaxsigill på nålens topp */
.goal-pin{position:absolute;left:41px;margin-top:-16px;z-index:3}
.goal-pin::before{content:'';position:absolute;left:0;top:0;width:2px;height:16px;background:var(--seal);border-radius:1px}
.goal-pin::after{content:'';position:absolute;left:-5px;top:-7px;width:13px;height:13px;border-radius:50%;
  background:radial-gradient(circle at 35% 30%,#c05a41,var(--seal) 60%,#742a1b);
  box-shadow:0 1px 3px rgba(36,28,16,.4),inset 0 1px 0 rgba(255,235,220,.35);
  animation:pinBob 1.8s ease-in-out infinite}
@keyframes pinBob{50%{transform:translateY(-2px)}}
.goal-lab{position:absolute;left:41px;transform:translateX(max(-50%,-52px));margin-top:-38px;
  font-family:var(--display);font-style:italic;font-size:.78rem;font-weight:700;color:var(--seal);
  white-space:nowrap;z-index:7;background:var(--paper);border:1px solid rgba(156,58,40,.4);
  padding:2px 9px 3px;border-radius:999px;box-shadow:1px 1px 0 rgba(36,28,16,.14)}

/* v15_year — Resenären BÄR året: en bläckblå plakett centrerad på axeln
   med timglas-siluett + aktuellt årtal. Året rullar i plaketten under
   resan (tickYear skriver hit). Pulsringen säger "du är här". */
.me{position:absolute;left:41px;height:34px;margin-top:-17px;z-index:6;
  /* alltid till höger om axeln; pilen (::before) pekar mot punkten.
     Kompakt nog att (för vanliga årtal) rymmas i rännan före korten */
  --tx:10px;
  transform:translateX(var(--tx));white-space:nowrap;
  display:inline-flex;align-items:center;gap:6px;padding:0 11px 0 9px;border-radius:999px;
  background:radial-gradient(ellipse at 35% 25%,#5b98a2,var(--accent) 55%,var(--accent-dim));
  box-shadow:0 2px 5px rgba(36,28,16,.35),inset 0 1px 0 rgba(233,242,242,.5);
  transition:top 1.15s cubic-bezier(.5,0,.3,1.05),transform .45s ease;}
.me::before{content:'';position:absolute;right:100%;top:50%;margin-top:-6px;
  border:6px solid transparent;border-right:7px solid var(--accent-dim);border-left:none}
.me-icon{fill:#f5eeda;width:16px;height:16px;flex:none;opacity:.95}
.me-year{font-family:var(--mono);font-weight:700;font-size:1.08rem;line-height:1;color:#f5eeda;
  font-variant-numeric:tabular-nums;letter-spacing:.01em}
.me.long .me-year{font-size:.84rem}
/* långa f.Kr-årtal: släpp timglaset så plaketten inte når in i korten */
.me.long{gap:0;padding:0 10px}
.me.long .me-icon{display:none}
.me::after{content:'';position:absolute;inset:-6px;border-radius:999px;border:1.5px solid var(--accent);
  animation:pulseRing 1.7s ease-out infinite}
@keyframes pulseRing{0%{transform:scale(.78);opacity:.85}75%{transform:scale(1.16);opacity:0}100%{opacity:0}}
.me.land{animation:landBounce .55s cubic-bezier(.34,1.56,.64,1)}
@keyframes landBounce{0%{transform:translateX(var(--tx)) scale(.55)}55%{transform:translateX(var(--tx)) scale(1.12)}100%{transform:translateX(var(--tx)) scale(1)}}
/* v14_g — resespår längs axeln + glödande symbol under resan + ankomstpuls */
.travel{position:absolute;left:41px;width:6px;margin-left:-3px;border-radius:4px;z-index:5;pointer-events:none;opacity:.92}
.travel.fwd{background:linear-gradient(180deg,var(--correct),rgba(60,111,68,.12));box-shadow:0 0 10px var(--correct-glow)}
.travel.back{background:linear-gradient(180deg,rgba(168,60,36,.12),var(--wrong));box-shadow:0 0 10px var(--wrong-glow)}
.me.mv-fwd{box-shadow:0 2px 5px rgba(36,28,16,.35),inset 0 1px 0 rgba(233,242,242,.5),0 0 0 4px var(--correct-glow),0 0 18px var(--correct)}
.me.mv-back{box-shadow:0 2px 5px rgba(36,28,16,.35),inset 0 1px 0 rgba(233,242,242,.5),0 0 0 4px var(--wrong-glow),0 0 18px var(--wrong)}
.arrive-ring{position:absolute;left:41px;width:38px;height:38px;margin:-19px 0 0 -19px;border-radius:50%;z-index:6;pointer-events:none;
  border:2.5px solid var(--accent);transform:scale(.4);opacity:.9;animation:arriveRing .8s ease-out forwards}
.arrive-ring.fwd{border-color:var(--correct)}
.arrive-ring.back{border-color:var(--wrong)}
@keyframes arriveRing{0%{transform:scale(.4);opacity:.9}100%{transform:scale(2.5);opacity:0}}
/* v14_i — diskret synkad glöd vid framkomst: en mjuk, varm guldglöd svävar upp
   och tonar bort SAMTIDIGT på spelarsymbolen och det valda kortet. Ingen
   ljusstyrke-spik/blink — bara en stilla resonans som säger att de hör ihop. */
.me.glint{animation:meGlow 1.2s ease-in-out}
@keyframes meGlow{
  0%,100%{box-shadow:0 2px 5px rgba(36,28,16,.35),inset 0 1px 0 rgba(233,242,242,.5)}
  50%{box-shadow:0 2px 5px rgba(36,28,16,.35),inset 0 1px 0 rgba(233,242,242,.5),0 0 12px 3px rgba(210,172,88,.48)}}
/* kortet får INGEN kant-glöd (det läste som en blink) utan en mjuk ljusstrimma
   som sveper över kortet en gång — en stilla glimt, inte ett blink. */
.card.glint::before{content:'';position:absolute;inset:0;pointer-events:none;z-index:2;border-radius:inherit;
  background:linear-gradient(105deg,transparent 38%,rgba(255,243,212,.5) 50%,transparent 62%);
  transform:translateX(-115%);animation:cardShimmer 1.15s ease-in-out}
@keyframes cardShimmer{to{transform:translateX(115%)}}
/* v14_h — flytande Nästa-knapp (manuell fortsättning efter svar) */
.next-fab{position:fixed;left:50%;bottom:calc(20px + env(safe-area-inset-bottom) + var(--tl-bottom));/* TEST: Next-knappens botten i linje med tidslinjens slut */
  transform:translate(-50%,18px);z-index:46;
  display:inline-flex;align-items:center;gap:8px;
  background:linear-gradient(180deg,#2a7d8c 0%,var(--accent) 55%,var(--accent-dim) 100%);color:#f5eeda;
  font-family:var(--ui);font-weight:700;font-size:1rem;letter-spacing:.02em;
  padding:14px 30px;border:none;border-radius:999px;cursor:pointer;min-height:50px;
  box-shadow:0 3px 0 #123f47,2px 6px 14px rgba(36,28,16,.32),inset 0 1px 0 rgba(233,242,242,.35);
  opacity:0;pointer-events:none;transition:opacity .35s ease,transform .35s cubic-bezier(.2,.7,.3,1.2)}
.next-fab.show{opacity:1;transform:translate(-50%,0);pointer-events:auto}
.next-fab:active{transform:translate(-50%,2px)}
/* v3: ingen manuell Nästa-knapp — en diskret “Checking…”-status visas en
   kort stund efter svaret, sedan går spelet vidare av sig självt */
.auto-next{position:fixed;left:50%;bottom:calc(20px + env(safe-area-inset-bottom) + var(--tl-bottom));
  transform:translate(-50%,8px);z-index:46;display:inline-flex;align-items:center;gap:2px;
  font-family:var(--mono);font-weight:700;font-size:.8rem;letter-spacing:.14em;text-transform:uppercase;
  color:var(--text-faint);opacity:0;pointer-events:none;
  transition:opacity .3s ease,transform .3s ease}
.auto-next.show{opacity:.85;transform:translate(-50%,0)}
.auto-next .ell{margin-left:1px}
.auto-next .ell i{font-style:normal;opacity:.2;animation:autoEll 1.2s infinite}
.auto-next .ell i:nth-child(2){animation-delay:.2s}
.auto-next .ell i:nth-child(3){animation-delay:.4s}
@keyframes autoEll{0%,80%,100%{opacity:.2}40%{opacity:1}}
.feedback .fb-ell i{font-style:normal;opacity:.2;animation:autoEll 1.2s infinite}
.feedback .fb-ell i:nth-child(2){animation-delay:.2s}
.feedback .fb-ell i:nth-child(3){animation-delay:.4s}

/* Besökta punkter: bläckprickar längs rutten */
.visited{position:absolute;left:41px;width:12px;height:12px;margin:-6px 0 0 -6px;border-radius:50%;z-index:4;
  transform:scale(0);box-shadow:0 0 0 3px var(--bg);transition:transform .4s cubic-bezier(.34,1.56,.64,1)}
.visited.show{transform:scale(1)}
.visited.fwd{background:var(--correct);box-shadow:0 0 0 3px var(--bg),0 1px 3px var(--correct-glow)}
.visited.back{background:var(--wrong);box-shadow:0 0 0 3px var(--bg),0 1px 3px var(--wrong-glow)}
.visited.start{background:var(--bg);border:1.5px solid var(--text-faint);box-shadow:none}
.visited-lab{position:absolute;left:56px;transform:translateY(-50%);font-family:var(--mono);font-size:.6rem;font-weight:700;
  color:var(--text-faint);z-index:4;white-space:nowrap}

/* Lediga platser: stilla streckade cirklar + guldbladsglitter */
.slot-wrap{position:absolute;left:41px;width:0;height:0;z-index:5}
.slot-mark{position:absolute;width:15px;height:15px;margin:-7.5px 0 0 -7.5px;
  background:var(--paper);border:2px dashed var(--accent);border-radius:50%;
  box-shadow:0 1px 2px rgba(36,28,16,.2)}

  ? EVENTS_EN.map(e => [e[0], SV_TEXTS[e[0]] || e[1]])
  : EVENTS_EN;

const fmtYear = LANG === "sv"
  ? (y => y < 0 ? Math.abs(y).toLocaleString("sv-SE") + " f.Kr" : (y < 1000 ? "år " + y : "" + y))
  : (y => y < 0 ? Math.abs(y).toLocaleString("en-US") + " BC" : (y < 1000 ? "AD " + y : "" + y));

/* Soft difficulty guard: the two cards in a question should sit comfortably
   apart in time, so general era feel is always a viable way to answer. The
   bar scales with how long ago we are (log-ish time perception). */
function minGap(y){
  const ago = Math.max(1, THIS_YEAR - y);
  return Math.min(60, Math.max(4, Math.round(ago * 0.05)));
}

function rndNext(st){
  st.a |= 0; st.a = st.a + 0x6D2B79F5 | 0;
  let t = Math.imul(st.a ^ st.a >>> 15, 1 | st.a);
  t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
  return ((t ^ t >>> 14) >>> 0) / 4294967296;
}
function hashStr(str){
  let h = 2166136261 >>> 0;
  for (let i = 0; i < str.length; i++){ h ^= str.charCodeAt(i); h = Math.imul(h, 16777619); }
  return h >>> 0;
}

/* =========================================================
   JOURNEY GRAPH — a journey is exactly 9 events in strict
   chronological order, with fixed roles:

     [T2, T1, B1, S0, B2, C1, B3, C2, GOAL]

   Spine: S0 → C1 → C2 → GOAL, so par is 3 by construction.
   Every node carries ONE fixed question [later/correct, earlier/wrong]:

     S0:[C1,B1]  C1:[C2,B2]  C2:[GOAL,B3]     (the spine)
     B2:[C2,B1]  B3:[GOAL,B1]                 (wrong turns rejoin one step up)
     B1:[C1,T1]  T1:[C1,T2]  T2:[C1,B1]       (the trap chain below the start;
                                                T2 is the floor — both options
                                                point forward)

   Fully deterministic: every player meets exactly the same questions,
   mistakes included. Wrong options you have already picked are greyed
   out on revisit, which also guarantees the game always terminates.
   ========================================================= */
function buildJourney(evs, seed){
  const [T2, T1, B1, S0, B2, C1, B3, C2, G] = evs;
  const pairs = new Map([
    [S0, [C1, B1]], [C1, [C2, B2]], [C2, [G, B3]],
    [B2, [C2, B1]], [B3, [G, B1]],
    [B1, [C1, T1]], [T1, [C1, T2]], [T2, [C1, B1]]
  ]);
  return { seed: seed || 0, events: evs, start: S0, goal: G, pairs };
}

/* SCHEMA C — seedad slumpvandring. Var och en av de 9 handelserna VALJS
   slumpmassigt (ej "narmast mal"), men bara bland kandidater pa ratt avstand
   fran den foregaende. Deterministiskt ur froet, haller avstand, och ger
   manga fler distinkta resor per startpunkt an den deterministiska vandringen. */
const WINDOW = 2.0;   // hur langt varje steg far hoppa, i multiplar av gStep
function gStep(y){
  const ago = Math.max(1, THIS_YEAR - y);
  return Math.min(120, Math.max(12, Math.round(ago * 0.08)));
}
function pickFwd(cur, rng, used){
  const g = gStep(EVENTS[cur][0]), lo = EVENTS[cur][0] + g, hi = EVENTS[cur][0] + WINDOW * g;
  let cand = [];
  for (let k = cur + 1; k < EVENTS.length; k++)
    if (!used.has(k) && EVENTS[k][0] >= lo && EVENTS[k][0] <= hi) cand.push(k);
  if (!cand.length)                                   // gles epok: narmaste bortom lo
    for (let k = cur + 1; k < EVENTS.length && !cand.length; k++)
      if (!used.has(k) && EVENTS[k][0] >= lo) cand.push(k);
  return cand.length ? cand[Math.floor(rndNext(rng) * cand.length)] : -1;
}
function pickBack(cur, rng, used){
  const g = gStep(EVENTS[cur][0]), hi = EVENTS[cur][0] - g, lo = EVENTS[cur][0] - WINDOW * g;
  let cand = [];
  for (let k = cur - 1; k >= 0; k--)
    if (!used.has(k) && EVENTS[k][0] <= hi && EVENTS[k][0] >= lo) cand.push(k);
  if (!cand.length)
    for (let k = cur - 1; k >= 0 && !cand.length; k--)
      if (!used.has(k) && EVENTS[k][0] <= hi) cand.push(k);
  return cand.length ? cand[Math.floor(rndNext(rng) * cand.length)] : -1;
}
function pickBetween(a, b, rng, used){                // mellan-handelse >= minGap fran bada grannarna
  const ga = minGap(EVENTS[a][0]), gb = minGap(EVENTS[b][0]);
  let cand = [];
  for (let k = a + 1; k < b; k++)
    if (!used.has(k) && EVENTS[k][0] - EVENTS[a][0] >= ga && EVENTS[b][0] - EVENTS[k][0] >= gb) cand.push(k);
  if (cand.length) return cand[Math.floor(rndNext(rng) * cand.length)];
  if (b - a < 2) return -1;                           // fallback: mittpunkten (som live)
  const mid = (EVENTS[a][0] + EVENTS[b][0]) / 2;
  let best = a + 1, bd = Infinity;
  for (let k = a + 1; k < b; k++){ const d = Math.abs(EVENTS[k][0] - mid); if (d < bd){ bd = d; best = k; } }
  return best;
}
function genJourney(seed){
  const rng = { a: seed }, N = EVENTS.length;
  const i = 8 + Math.floor(rndNext(rng) * (N - 24));   // START — samma val som live
  const used = new Set([i]);
  const c1 = pickFwd(i, rng, used);    if (c1 < 0) return null; used.add(c1);
  const c2 = pickFwd(c1, rng, used);   if (c2 < 0) return null; used.add(c2);
  const goal = pickFwd(c2, rng, used); if (goal < 0) return null; used.add(goal);
  const b1 = pickBack(i, rng, used);   if (b1 < 0) return null; used.add(b1);
  const t1 = pickBack(b1, rng, used);  if (t1 < 0) return null; used.add(t1);
  const t2 = pickBack(t1, rng, used);  if (t2 < 0) return null; used.add(t2);
  const b2 = pickBetween(i, c1, rng, used);  if (b2 < 0) return null; used.add(b2);
  const b3 = pickBetween(c1, c2, rng, used); if (b3 < 0) return null; used.add(b3);
  const idx = [t2, t1, b1, i, b2, c1, b3, c2, goal];
  for (let k = 1; k < 9; k++) if (idx[k] <= idx[k-1]) return null;   // maste vara strikt stigande
  return buildJourney(idx.map(k => EVENTS[k]), seed);
}

/* every question must be answerable on era feel alone: gap >= minGap */
function journeyQuality(j){
  let ok = true;
  j.pairs.forEach((p, node) => {
    if (p[0][0] - p[1][0] < minGap(node[0])) ok = false;
  });
  return ok;
}
function journeySig(j){ return j.start[0] + ">" + j.goal[0]; }
function startIdx(j){ return EVENTS.indexOf(j.start); }

function dateForOffset(off){
  const d = new Date();
  d.setDate(d.getDate() + off);
  return d;
}
function dateKey(d){ return d.getFullYear() + "-" + (d.getMonth() + 1) + "-" + d.getDate(); }

/* =========================================================
   HAND-DESIGNED JOURNEYS — optional overrides, keyed by date.
   A spec is simply 9 events, OLDEST → NEWEST; roles follow from
   the order (see the diagram above). If a date has no spec the
   journey is generated from the seed as usual.
   Example:
   "2026-7-31": [
     [-3500,"The wheel is invented in Mesopotamia"], … 8 more …
   ]
   ========================================================= */
const SPEC_JOURNEYS = {
  // Hand-designed journeys, keyed by date ("YYYY-M-D", no zero padding).
  // Value = 9 events, OLDEST → NEWEST; roles [T2,T1,B1,S0,B2,C1,B3,C2,GOAL]
  // follow from the order. Dates without a spec use the generator.
  // Full format docs: "Daily Time Travel - Speca resor.md" in the project folder.
  // Example:
  // "2026-8-1": [
  //   [1889, "The Eiffel Tower is inaugurated"],
  //   [1896, "The first modern Olympics in Athens"],
  //   [1903, "The Wright brothers' first flight"],
  //   [1912, "The Titanic sinks"],
  //   [1928, "Penicillin is discovered"],
  //   [1929, "The Wall Street Crash"],
  //   [1941, "The attack on Pearl Harbor"],
  //   [1945, "The atomic bomb is dropped on Hiroshima"],
  //   [1969, "The Moon landing"]
  // ]
};

function journeyForOffset(off, depth){
  const key = dateKey(dateForOffset(off));
  if (SPEC_JOURNEYS[key]){
    const evs = SPEC_JOURNEYS[key].slice().sort((x, y) => x[0] - y[0]);
    return buildJourney(evs, hashStr("spec-" + key));
  }
  depth = depth || 0;
  // era variety: never yesterday's signature, and start >= 30 index
  // positions away from yesterday's start
  const prev = depth > 2 ? null : journeyForOffset(off - 1, depth + 1);
  let fallback = null, last = null, j;
  for (let salt = 0; salt < 80; salt++){
    j = genJourney(hashStr("timetravel-" + key + (salt ? "-" + salt : "")));
    if (!j) continue;                       // year-aware gen may reject a seed -> try next
    last = j;
    const okVar = !prev || (journeySig(j) !== journeySig(prev) &&
                  (startIdx(prev) < 0 || Math.abs(startIdx(j) - startIdx(prev)) >= 30));
    if (okVar && journeyQuality(j)) return j;
    if (okVar && fallback === null) fallback = j;
  }
  return fallback || last;
}

    e.style.animationDelay = (Math.random() * 10) + "s";
    document.body.appendChild(e);
  }
}

/* SVG-linje som RITAS UPP från det valda alternativet och knyter sig fast i
   platsen på tidsaxeln — riktningen går kort → axel, inte tvärtom. */
function drawConnector(cardEl, slotEl, cls){
  if (!cardEl || !slotEl) return null;
  const bw = boardEl.getBoundingClientRect();
  const c = cardEl.getBoundingClientRect(), s = slotEl.getBoundingClientRect();
  if (c.width === undefined || s.width === undefined) return null;
  // Ny routing för botten-layouten: korten ligger nu längst ner, så linjen
  // stiger ur kortets ÖVERKANT, sveper vänster i den tomma rännan under frågan
  // och skjuter sedan UPP längs tidsaxeln till årsmarkören — den korsar aldrig
  // frågan/texten (som sitter centrerad, ovanför rännan).
  const x0 = c.left + c.width / 2 - bw.left, y0 = c.top - bw.top; // kortets överkant, mitten
  const x1 = s.left + s.width / 2 - bw.left, y1 = s.top + s.height / 2 - bw.top; // årsmarkören
  const gx = x1;                    // rännan ligger vid axeln
  const corridorY = y0 - 10;        // sväng-höjd i gapet strax under brädet (under textlagret)
  const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
  path.setAttribute("d",
    "M" + x0 + "," + y0 +
    " C" + x0 + "," + corridorY + " " + ((x0 + gx) / 2) + "," + corridorY + " " + gx + "," + corridorY +
    " L" + x1 + "," + y1);
  path.setAttribute("class", "conn-path " + cls);
  connSvg.appendChild(path);
  if (cls === "dim"){ path.remove(); return null; }
  const len = path.getTotalLength();
  path.style.strokeDasharray = len;
  path.style.strokeDashoffset = len;
  path.getBoundingClientRect();
  path.style.transition = "stroke-dashoffset .55s cubic-bezier(.4,0,.2,1)";
  path.style.strokeDashoffset = "0";
  path.classList.add("show");
  return path;
}
function fadeConnector(path){
  if (!path) return;
  path.classList.add("fade-out");
  setTimeout(() => path.remove(), 700);
}

function buildAxis(){
  axisEl.querySelectorAll(".axis-tick,.axis-tick-lab,.goal-pin,.goal-lab,.visited,.visited-lab,.slot-wrap,.slot-lab")
        .forEach(n => n.remove());
  visitedLabYs = [];
  const lo = J.events[0][0];
  const hi = S.goal[0];
  // TEST: liten proportionell bottenmarginal (~5% av skalan) — tidslinjen når närmare knapparna
  const pad = (hi - lo) * 0.05;
  // TEST: målet = skalans topp (inget toppspann) → goal högst upp i höjd med sidhuvudet
  AXIS_MIN = lo - pad; AXIS_MAX = hi;
  const span = AXIS_MAX - AXIS_MIN;
  const step = [5, 10, 25, 50, 100, 250, 500, 1000, 2500, 5000].find(st => span / st <= 9) || 5000;
  for (let y = Math.ceil(AXIS_MIN / step) * step; y <= AXIS_MAX; y += step){
    if (y > hi) continue; // inga skalstreck ovanför målet — skylten är linjens tak
    add("axis-tick", y); add("axis-tick-lab", y).textContent = fmtYear(y);
  }
  add("goal-pin", hi);
  add("goal-lab", hi).textContent = T.goalLab + fmtYear(hi);
  const line = $("axisLine");
  line.style.top = yPct(hi) + "%"; // TEST: linjen börjar vid målet — inget streck ovanför goal
  line.style.animation = "none"; line.getBoundingClientRect(); line.style.animation = "";
}
function add(cls, year, atPct){
  const d = document.createElement("div");
  d.className = cls;
  d.style.top = (atPct === undefined ? yPct(year) : atPct) + "%";
  axisEl.appendChild(d);
  return d;
}
function mark(year, cls, withLabel){
  const el = add("visited " + (cls || ""), year);
  requestAnimationFrame(() => el.classList.add("show"));
  if (withLabel === false) return;
  const y = yPct(year);
  if (visitedLabYs.some(v => Math.abs(v - y) < 3.2)) return;
  visitedLabYs.push(y);
  add("visited-lab", year).textContent = fmtYear(year);
}
function showCandidates(){
  axisEl.querySelectorAll(".slot-wrap,.slot-lab").forEach(n => n.remove());
  slotEls = new Map(); slotLabEls = new Map();
  const evs = [pair.a, pair.b];
  const ys = evs.map(e => yPct(e[0]));
  let lys = ys.slice();
  if (Math.abs(lys[0] - lys[1]) < 6){
    const mid = (lys[0] + lys[1]) / 2, sign = lys[0] <= lys[1] ? 1 : -1;
    lys[0] = mid - 3 * sign; lys[1] = mid + 3 * sign;
  }
  const meY = yPct(S.pos);
  // plaketten är högre än gamla brickan — håll kandidatetiketterna längre ifrån
  lys = lys.map(v => Math.abs(v - meY) < 5.5 ? (v <= meY ? meY - 5.5 : meY + 5.5) : v);
  evs.forEach((ev, k) => {
    const mark = addSlotMark(ev, k === 1);
    slotEls.set(ev, mark);
    const lab = add("slot-lab", ev[0], lys[k]);
    lab.textContent = fmtYear(ev[0]);
    slotLabEls.set(ev, lab);
    // diskret hint: mjuk glöd, växelvis mellan de två platserna (etiketter orörda)
    mark.style.setProperty("--hint-delay", k === 1 ? ".14s" : "0s");
    mark.classList.add("hint");
  });
}

/* Symbolen på axeln är stilla — uppmärksamheten kommer i stället från ett
   par tysta stjärngnistor som tänds/slocknar runt den, asynkront staplade
   (olika delay/varaktighet) så det känns levande utan att symbolen rör sig. */
function addSlotMark(ev, isAlt){
  const wrap = document.createElement("div");
  wrap.className = "slot-wrap";
  wrap.style.top = yPct(ev[0]) + "%";
  axisEl.appendChild(wrap);

  const mark = document.createElement("div");
  mark.className = "slot-mark";
  wrap.appendChild(mark);

  // delays ligger på jämna tredjedelar av varvet (~3.2s) så en gnista alltid
  // är på väg upp när en annan tonar ner — ingen stund där alla tre är släckta
  const layout = isAlt
    ? [ { top: "-16px", left: "8px",  delay: ".5s",  dur: "3.2s", size: "11px" },
        { top: "7px",   left: "10px", delay: "1.57s",dur: "3.0s", size: "8px",  blue: true },
        { top: "-2px",  left: "-14px",delay: "2.63s",dur: "3.4s", size: "9px" } ]
    : [ { top: "-15px", left: "-10px",delay: "0s",   dur: "3.1s", size: "12px" },
        { top: "9px",   left: "-6px", delay: "1.07s",dur: "3.3s", size: "9px",  blue: true },
        { top: "-4px",  left: "12px", delay: "2.13s",dur: "3.2s", size: "8px" } ];
  layout.forEach(p => {
    const s = document.createElement("span");
    s.className = "sparkle" + (p.blue ? " blue" : "");
    s.textContent = "✦";
    s.style.top = p.top; s.style.left = p.left;
    s.style.fontSize = p.size;
    s.style.animationDelay = p.delay;
    s.style.animationDuration = p.dur;
    wrap.appendChild(s);
  });
  return mark;
}
function moveMe(animate){
  const me = $("me");
  if (!animate){ me.style.transition = "none"; }
  me.style.top = yPct(S.pos) + "%";
  if (!animate){ me.getBoundingClientRect(); me.style.transition = ""; }
  if (animate){ me.classList.remove("land"); me.getBoundingClientRect(); me.classList.add("land"); }
}

/* v14_g: gör förflyttningen tydlig — ett färgat "resespår" ritas längs axeln i
   färdriktningen (grönt framåt / rött bakåt), spelarsymbolen glöder i samma färg
   under resan och möts av en färgad ankomstpuls. Så syns det VAD som hände och
   OM det var bra eller dåligt. */
function showTravel(fromPos, toPos, forward, card){
  const TRAVEL = 1150; // långsammare resa (v14_i)
  const y0 = yPct(fromPos), y1 = yPct(toPos);
  const top = Math.min(y0, y1), h = Math.abs(y1 - y0);
  const trail = document.createElement("div");
  trail.className = "travel " + (forward ? "fwd" : "back");
  trail.style.top = top + "%";
  trail.style.height = h + "%";
  trail.style.transformOrigin = forward ? "bottom" : "top"; // väx från startpunkten
  trail.style.transform = "scaleY(0)";
  axisEl.appendChild(trail);
  requestAnimationFrame(() => {
    trail.style.transition = "transform 1.15s cubic-bezier(.5,0,.3,1.05)";
    trail.style.transform = "scaleY(1)";
  });
  setTimeout(() => { trail.style.transition = "opacity .5s ease"; trail.style.opacity = "0"; }, TRAVEL + 150);
  setTimeout(() => trail.remove(), TRAVEL + 650);

  const me = $("me");
  me.classList.remove("mv-fwd", "mv-back");
  void me.offsetWidth;
  me.classList.add(forward ? "mv-fwd" : "mv-back");
  setTimeout(() => {
    me.classList.remove("mv-fwd", "mv-back");
    const ring = document.createElement("div");
    ring.className = "arrive-ring " + (forward ? "fwd" : "back");
    ring.style.top = y1 + "%";
    axisEl.appendChild(ring);
    setTimeout(() => ring.remove(), 850);
    // synkad glimt: symbolen och det valda kortet blinkar till samtidigt
    me.classList.remove("glint"); void me.offsetWidth; me.classList.add("glint");
    if (card){ card.classList.remove("glint"); void card.offsetWidth; card.classList.add("glint"); }
    setTimeout(() => { me.classList.remove("glint"); if (card) card.classList.remove("glint"); }, 1250);
  }, TRAVEL);
}

/* v14_h: optimalt antal hopp kvar till målet från nuvarande läge (klonar
   staten och spelar optimalt). Efter ett bra kliv minskar det, efter ett
   felkliv ökar det. */
function remainingOptimal(){
  let node = cur, hops = 0;
  while (node !== J.goal && hops < 20){
    const p = J.pairs.get(node);
    if (!p) break;
    node = p[0]; hops++;
  }
  return hops;
}

/* v17_centrum: "Du är här!" bor i spelarens centrum (feedback-raden) och
   en bläckkurva ritas därifrån till plaketten på axeln — samma formspråk
   som svarslinjerna kort→plats. Kurvan tonar ut vid första valet. */
let introPath = null, curEvent = null;
function posHTML(){
  // bara händelsen — året står redan på plaketten
  return '<span class="fb-pos">' + curEvent[1] + '</span>';
}
function ensureIntroDefs(){
  if (document.getElementById("introHead")) return;
  connSvg.insertAdjacentHTML("afterbegin",
    '<defs><marker id="introHead" viewBox="0 0 10 10" refX="7.5" refY="5" markerWidth="4.6" markerHeight="4.6" orient="auto-start-reverse">' +
    '<path d="M1.5,1.5 L8.5,5 L1.5,8.5" fill="none" stroke="#1c5a66" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>');
}
function showIntro(){
  fbEl.innerHTML = '<span id="fbIntro">' + T.here + '</span>' + posHTML();
  fbEl.className = "feedback show fwd";
  if (introPath){ introPath.remove(); introPath = null; }
  setTimeout(() => {
    if (steps > 0 || busy) return;
    // Intro-pilen är borttagen (den korsade texten i den nya botten-layouten).
    // Guidningen sker istället genom att svarskorten glimmar till i tur och ordning.
    [...cardsEl.children].forEach((c, i) => {
      setTimeout(() => c.classList.add("beckon"), 900 + i * 240);
    });
    return;
    const t = fbEl.querySelector(".fb-pos");
    if (!t) return;
    ensureIntroDefs();
    const bw = boardEl.getBoundingClientRect();
    // OBS: .fb-pos är display:block och spänner hela kolumnen — mät därför
    // SJÄLVA TEXTENS kant via en Range, annars ankras pilen i blockkanten
    // (som kan ligga inne vid plaketten) och kurvan blir en krok bakom den
    const rng = document.createRange();
    rng.selectNodeContents(t);
    const f = rng.getBoundingClientRect(), m = $("me").getBoundingClientRect();
    if (!f.width || !m.width) return;
    const x0 = f.left - bw.left - 7, y0 = f.top + f.height / 2 - bw.top;
    const x1 = m.right - bw.left + 9, y1 = m.top + m.height / 2 - bw.top;
    const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
    // Kurvan får inte korsa frågetexten (strax under centrum-raden) eller
    // korten: den svänger av tidigt och dyker ner i axel-rännan, och landar
    // på plakettens OVANSIDA (eller undersida om plaketten är ovanför) —
    // hela nedfarten sker vänster om både fråga och kort. Kurvan är dessutom
    // kortlivad (tonar ut efter 3 s), så en tillfällig korsning av en
    // årtalsetikett gör inget.
    const mx = (m.left + m.right) / 2 - bw.left;
    let d;
    if (m.top - bw.top > y0 + 34){        // plaketten under centrum-raden
      d = "M" + x0 + "," + y0 + " Q" + mx + "," + y0 + " " + mx + "," + (m.top - bw.top - 6);
    } else if (m.bottom - bw.top < y0 - 34){ // plaketten ovanför
      d = "M" + x0 + "," + y0 + " Q" + mx + "," + y0 + " " + mx + "," + (m.bottom - bw.top + 6);
    } else {                               // samma höjd — kort båge rakt in i sidan
      d = "M" + x0 + "," + y0 + " Q" + (x0 + x1) / 2 + "," + y0 + " " + x1 + "," + y1;
    }
    path.setAttribute("d", d);
    path.setAttribute("class", "conn-path melink");
    path.setAttribute("marker-end", "url(#introHead)");
    connSvg.appendChild(path);
    const len = path.getTotalLength();
    path.style.strokeDasharray = len;
    path.style.strokeDashoffset = len;
    path.getBoundingClientRect();
    path.style.transition = "stroke-dashoffset .7s ease";
    path.style.strokeDashoffset = "0";
    path.classList.add("show");
    introPath = path;
    // pilen är en startgest — den tonar ut av sig själv efter 3 sekunder,
    // och lämnar över till frågan som glimmar till: "svara på den här"
    setTimeout(() => {
      if (introPath !== path) return;
      fadeConnector(introPath); introPath = null;
      setTimeout(() => {
        if (steps > 0 || busy) return;
        [...cardsEl.children].forEach((c, i) => {
          // OBS: klassen tas INTE bort efteråt — då återstartar kortets
          // fadeIn-animation och kortet blinkar till. Korten byggs om
          // varje runda, så klassen städas bort naturligt.
          setTimeout(() => c.classList.add("beckon"), i * 240);
        });
      }, 350);
    }, 3000);
  }, 500);
}

/* =========================================================
   DAILY-GAME LAYER — persistence, streak, share, countdown,
   feedback, analytics. New for Daily Time Travel.
   ========================================================= */
const SITE_URL = "https://daily-time-travel.netlify.app";
const STORAGE_KEY = "ttv_daily_v1";
const EPOCH = new Date(2026, 6, 6); // day #1 — month is 0-indexed

let _memStore = {};
function loadStore(){
  if (window.TT_TEST_MODE) return _memStore;
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; } catch (e){ return {}; }
}
function saveStore(st){
  if (window.TT_TEST_MODE){ _memStore = st; return; }
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(st)); } catch (e){}
}
function dayNum(off){
  const d = dateForOffset(off); d.setHours(12, 0, 0, 0);
  const e = new Date(EPOCH); e.setHours(0, 0, 0, 0);
  return Math.floor((d - e) / 86400000) + 1;
}
function savedResultFor(off){
  if (off !== 0) return null;
  const r = ((loadStore().days) || {})[dateKey(dateForOffset(0))] || null;
  // a result belongs to a specific journey — if today's journey has changed
  // (e.g. redeploy with a new spec), a stale result must not be restored
  return (r && r.sig === journeySig(J)) ? r : null;
}
function getDayStreak(){
  const days = (loadStore().days) || {};
  let n = 0;
  for (let off = 0; off > -3650; off--){
    if (days[dateKey(dateForOffset(off))]) n++;
    else if (off === 0) continue; // today not finished yet doesn't break the streak
    else break;
  }
  return n;
}
function renderDailyStats(){
  const days = (loadStore().days) || {};
  const played = Object.keys(days).length;
  if (!played){ $("dstats").innerHTML = ""; return; }
  const perfect = Object.values(days).filter(d => d.h <= d.par).length;
  $("dstats").innerHTML =
    '<div class="box"><div class="num">' + played + '</div><div class="lab">' + T.played + '</div></div>' +
    '<div class="box"><div class="num gold">' + getDayStreak() + '</div><div class="lab">' + T.dayStreak + '</div></div>' +
    '<div class="box"><div class="num">' + perfect + '</div><div class="lab">' + T.perfectLab + '</div></div>';
}

/* Analytics — GoatCounter custom events, with a queue for events that fire
   before count.js has loaded. Test mode + own devices send nothing. */
window._gcQueue = window._gcQueue || [];
function _gcSend(p){ try { window.goatcounter.count(p); } catch (e){} }
(function _gcWait(){
  let tries = 0;
  const t = setInterval(function(){
    if (window.goatcounter && typeof window.goatcounter.count === "function"){
      clearInterval(t);
      while (window._gcQueue.length) _gcSend(window._gcQueue.shift());
    } else if (++tries > 100) clearInterval(t);
  }, 100);
})();
function trackEvent(name, title){
  if (window.TT_TEST_MODE || window.TT_OWN_DEVICE) return;
  const p = { path: "event/" + name, title: title || name, event: true };
  if (window.goatcounter && typeof window.goatcounter.count === "function") _gcSend(p);
  else window._gcQueue.push(p);
}

function showToast(msg){
  const t = $("toast"); t.textContent = msg; t.classList.add("show");
  clearTimeout(showToast._t); showToast._t = setTimeout(() => t.classList.remove("show"), 2200);
}
function shareResult(){
  const trail = history.map(h => h.correct ? "\u{1F7E2}" : "\u{1F534}").join("");
  const streakD = getDayStreak();
  const textNoUrl = "\u23F3 Daily Time Travel #" + dayNum(dayOffset) + "\n" +
    fmtYear(S.start[0]) + " \u2192 " + fmtYear(S.goal[0]) + " \u00B7 " +
    steps + " " + (steps === 1 ? T.hop : T.hops) + " (par " + optimal + ")\n" +
    trail + (streakD > 1 ? T.streakLine + streakD + T.daysWord : "");
  const shareUrl = SITE_URL + (LANG === "sv" ? "/sv" : "");
  const full = textNoUrl + "\n" + shareUrl;
  if (navigator.share){
    navigator.share({ title: "Daily Time Travel", text: textNoUrl, url: shareUrl })
      .then(() => trackEvent(EV + "share_native", "TT shared (native)"))
      .catch(err => { if (err && err.name === "AbortError") return; copyShare(full); });
  } else copyShare(full);
}
function copyShare(t){
  trackEvent(EV + "share_copy", "TT result copied");
  navigator.clipboard.writeText(t).then(() => showToast(T.copied))
    .catch(() => showToast(T.copyFail));
}

let cdTimer = null;
function startCountdown(){

function newGame(offset, opts){
  dayOffset = offset === undefined ? dayOffset : offset;
  J = journeyForOffset(dayOffset);
  optimal = PAR;
  S = { pos: J.start[0], start: J.start, goal: J.goal };
  cur = J.start;
  wrongPicked = new Map();
  curEvent = S.start;
  steps = 0; wrongs = 0; streak = 0; history = []; busy = false;
  $("steps").textContent = 0; $("wrongs").textContent = 0; $("streak").textContent = 0;
  $("optimal").textContent = optimal + " " + (optimal === 1 ? T.hop : T.hops);
  setYearNow(S.pos);
  $("dayLab").textContent = T.journeyWord + dayNum(dayOffset) + " · " +
    dateForOffset(dayOffset).toLocaleDateString(T.locale, LANG === "sv" ? { day: "numeric", month: "long" } : { month: "long", day: "numeric" });
  $("jbStart").textContent = S.start[1] + " (" + fmtYear(S.start[0]) + ")";
  $("jbEnd").textContent = fmtYear(S.goal[0]);
  $("resultScreen").classList.remove("show");

  var _an = document.getElementById("autoNext"); if (_an) _an.classList.remove("show");
  buildAxis();
  moveMe(false);
  const saved = savedResultFor(dayOffset);
  if (saved && !(opts && opts.replay)){
    restoreFinished(saved);
    return;
  }
  nextRound();
  showIntro();
}

/* Already finished today (e.g. reopened the page): put the traveler at the
   goal and show the saved result — "Play again" replays without overwriting. */
function restoreFinished(saved){
  steps = saved.h; wrongs = saved.w;
  // Look up the text in the current language's event list (the result may have
  // been played in the other language); fall back to the stored text.
  history = saved.route.map(r => {
    const ev = EVENTS.find(e => e[0] === r[0]);
    return { year: r[0], text: ev ? ev[1] : r[1], correct: !!r[2], forward: true };
  });
  $("steps").textContent = steps; $("wrongs").textContent = wrongs;
  S.pos = S.goal[0]; cur = J.goal; curEvent = S.goal;
  setYearNow(S.pos);
  moveMe(false);
  fbEl.innerHTML = T.arrived + posHTML();
  fbEl.className = "feedback show fwd";
  showResultPanel(true);
}

function nextRound(){
  const p = cur === J.goal ? null : J.pairs.get(cur);
  if (!p){
    S.pos = S.goal[0];
    curEvent = S.goal;
    moveMe(true);
    win();
    return;
  }
  pair = { a: p[0], b: p[1] };
  showCandidates();
  // centrum-raden rensas inte — senaste instruktionen står kvar tills nästa val
  // kortordningen är seedad per position — samma för alla spelare
  const flip = (hashStr(J.seed + "@" + cur[0]) & 1) === 1;
  const order = flip ? [pair.b, pair.a] : [pair.a, pair.b];
  const tried = wrongPicked.get(cur);
  cardsEl.className = "cards";
  cardsEl.innerHTML = "";
  order.forEach((ev, idx) => {
    const b = document.createElement("button");
    b.className = "card";
    b.style.animationDelay = (idx * .07) + "s";
    b.innerHTML =
      '<span class="event">' + ev[1] + '</span>' +
      '<span class="reveal-row"><span class="year">' + fmtYear(ev[0]) + '</span></span>' +
      '<span class="badge"></span>';
    b._year = ev[0];
    if (tried && tried.has(ev)){
      // redan provat felval: gråat, klickbart aldrig igen
      b.classList.add("back", "dim", "revealed");
      b.disabled = true;
      b.querySelector(".badge").textContent = "\u2715";
    } else {
      b.onclick = () => choose(ev);
    }
    cardsEl.appendChild(b);
  });
}

function choose(ev){
  if (busy) return; busy = true;
  if (introPath){ fadeConnector(introPath); introPath = null; }
  cardsEl.classList.add("locked");
  // v4: visa “Checking…” i feedback-sektionen innan facit avslöjas
  fbEl.innerHTML = T.checking + ' <span class="fb-ell"><i>.</i><i>.</i><i>.</i></span>';
  fbEl.className = "feedback show";
  const other = ev === pair.a ? pair.b : pair.a;
  const oldPos = S.pos;
  const forward = ev[0] > oldPos;   // direction we travel
  const correct = ev === pair.a;    // pair.a is always the later event
  if (!window._ttStep1Sent){ window._ttStep1Sent = true; trackEvent(EV + "step1", "TT first hop"); }
  const chosenSlot = slotEls.get(ev), otherSlot = slotEls.get(other);
  if (!correct){
    if (!wrongPicked.has(cur)) wrongPicked.set(cur, new Set());
    wrongPicked.get(cur).add(ev);
  }
  cur = ev;
  S.pos = ev[0];
  steps++;
  if (correct){ streak++; } else { wrongs++; streak = 0; }
  $("steps").textContent = steps; $("wrongs").textContent = wrongs; $("streak").textContent = streak;
  if (correct && streak > 1){
    const chip = $("streakChip");
    chip.classList.remove("pop"); chip.getBoundingClientRect(); chip.classList.add("pop");
  }
  history.push({ year: ev[0], text: ev[1], forward, correct });
  curEvent = ev;

  // v4: fördröj facit tills "Checking…" har visats en stund
  setTimeout(() => {
  let chosenCard = null, otherCard = null;
  [...cardsEl.children].forEach(c => {
    if (c._year === ev[0]){
      c.classList.add(correct ? "fwd" : "back");
      const bd = c.querySelector(".badge"); if (bd) bd.textContent = correct ? "\u2713" : "\u2715";
      chosenCard = c;
    }
    else otherCard = c;
  });

  // v14_h: ditt landningsår står i den STORA siffran (rullar med symbolen), så
  // året visas bara på DET ANDRA kortet. Ingen "X år framåt/bakåt" — texten under
  // siffran berättar i stället hur många steg som är kvar till målet.
  setTimeout(() => {
    // inga årtal/etiketter i knapparna — bara färg + bock/kryss på korten
    if (chosenSlot){
      chosenSlot.className = "slot-mark resolved " + (forward ? "fwd" : "back");
      chosenSlot.parentElement.classList.add("resolved");
    }
    // plaketten landar exakt på det valda året och visar samma siffra —
    // tona ut kandidatetiketten så det inte blir dubblerat/rörigt
    const chosenLab = slotLabEls.get(ev);
    if (chosenLab){ chosenLab.style.transition = "opacity .4s ease .75s"; chosenLab.style.opacity = "0"; }
    if (otherSlot){
      otherSlot.className = "slot-mark resolved other";
      otherSlot.parentElement.classList.add("resolved");
    }
    showTravel(oldPos, S.pos, forward, chosenCard);
    moveMe(true);
    // valpil (som i tidiga versioner): linje från valda kortet till platsen
    // på axeln dit vi reser — valet styr vart vi åker. Tonar ut efter resan.
    const chConn = drawConnector(chosenCard, chosenSlot, forward ? "correct" : "wrong");
    setTimeout(() => fadeConnector(chConn), 2000);
    tickYear(oldPos, S.pos, 1150);          // siffran rullar samtidigt som symbolen åker
    if (S.pos >= S.goal[0]){
      // framme — ingen Nästa-knapp, gå direkt till slutskärmen efter ankomsten
      fbEl.innerHTML = T.arrived + posHTML();
      fbEl.className = "feedback show fwd";
      busy = false;
      setTimeout(win, 2300);
    } else {
      const left = remainingOptimal();
      const hopsWord = left === 1 ? T.hop : T.hops;
      if (!correct){
        fbEl.innerHTML = (forward ? T.notQuite : T.wrongBack) +
          " <b>" + left + "</b> " + hopsWord + " " + T.toGo + posHTML();
        fbEl.className = "feedback show back";
      } else {
        fbEl.innerHTML = T.right + " <b>" + left + "</b> " + hopsWord + " " + T.toGo + posHTML();
        fbEl.className = "feedback show fwd";
      }
      // v3: visa “Checking…” en kort stund, gå sedan vidare automatiskt
      setTimeout(advanceNext, 1500);
    }
  }, 480);
  }, 1000);

  if (typeof navigator !== "undefined" && navigator.vibrate) navigator.vibrate(forward ? 15 : [10, 40, 30]);
}

function tickYear(from, to, dur){
  const t0 = performance.now();
  function frame(t){
    const k = Math.min(1, (t - t0) / dur);
    const e = 1 - Math.pow(1 - k, 3);
    let v = Math.round(from + (to - from) * e); if (v === 0) v = 1;
    setYearNow(v);
    if (k < 1) requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);
}

function win(){
  if (dayOffset === 0 && !window.TT_PREVIEW_MODE && !savedResultFor(0)){
    const st = loadStore(); st.days = st.days || {};
    st.days[dateKey(dateForOffset(0))] = {
      h: steps, w: wrongs, par: optimal, sig: journeySig(J),
      route: history.map(h => [h.year, h.text, h.correct ? 1 : 0])
    };
    saveStore(st);
    trackEvent(EV + "won", "TT journey won");
    trackEvent(EV + "result_" + steps, "TT result: " + steps + " hops");
    if (steps <= optimal) trackEvent(EV + "perfect", "TT perfect journey");
  }
  showResultPanel(false);
}
function showResultPanel(restored){
  $("goalName").textContent = S.goal[1];
  $("finalYear").textContent = fmtYearLong(S.goal[0]);
  $("cmpYou").textContent = steps;
  $("cmpBest").textContent = optimal;
  $("resultDots").innerHTML = history.map((h, i) =>
    '<span class="' + (h.correct ? "" : "back") + '" style="animation-delay:' + (i * .1) + 's"></span>'
  ).join("");
  const over = steps - optimal;
  $("finalText").innerHTML =
    over <= 0
      ? T.perfect
      : T.youWere + over + " " + (over === 1 ? T.hop : T.hops) + T.overPar +
        (wrongs ? T.andTook + wrongs + (LANG === "sv" ? "" : (wrongs === 1 ? T.wrongTurn : T.wrongTurns)) + T.backInTime : ".");
  // Same direction as the in-game axis: latest event on top, "journey begins"
  // at the bottom — hence the reversed route list.
  $("route").innerHTML =
    ['<div class="row"><span class="y">' + fmtYear(S.start[0]) + '</span><span>' + S.start[1] + T.begins + '</span></div>']
      .concat(history.map(h =>
        '<div class="row' + (h.correct ? "" : " back") + '"><span class="y">' + fmtYear(h.year) + '</span><span>' + h.text + '</span></div>'
      ))
      .reverse().join("");
  renderDailyStats();
  startCountdown();
  $("btnNextDay").style.display = window.TT_TEST_MODE ? "" : "none";
  $("boardWrap").style.display = "none";
  $("nextFab").classList.remove("show");
  $("resultScreen").classList.add("show");
  window.scrollTo(0, 0);
  if (restored) return; // no confetti when just re-opening the page
  for (let i = 0; i < 26; i++){
    const c = document.createElement("div");
    c.className = "confetti";
    c.style.left = Math.random() * 100 + "vw";
    const cols = ["#41754a", "#a2751c", "#ab4028"];
    c.style.background = "linear-gradient(180deg,transparent,#e9dec4," + cols[i % 3] + ",transparent)";
    c.style.animationDuration = 1.6 + Math.random() * 1.4 + "s";
    c.style.animationDelay = Math.random() * .9 + "s";
    document.body.appendChild(c);
  }
}

$("btnNextDay").onclick = () => newGame(dayOffset + 1, { replay: true });
$("btnReplay").onclick = () => { trackEvent(EV + "replay", "TT play again"); newGame(dayOffset, { replay: true }); };
$("btnShare").onclick = shareResult;
$("fbLink").onclick = e => { e.preventDefault(); openFeedback(); };
$("fbSend").onclick = sendFeedback;
$("fbCancel").onclick = () => $("fbOverlay").classList.remove("show");
$("fbOverlay").onclick = e => { if (e.target === $("fbOverlay")) $("fbOverlay").classList.remove("show"); };
function advanceNext(){
  $("autoNext").classList.remove("show");
  $("nextFab").classList.remove("show");
  busy = false;
  if (S.pos >= S.goal[0]) win();
  else nextRound();
}
document.getElementById("nextFab").onclick = advanceNext;
if (window.TT_TEST_MODE){
  const tb = document.createElement("div");
  tb.className = "test-badge";
  tb.textContent = window.TT_PREVIEW_MODE ? "TOMORROW" : "TEST";
  document.body.appendChild(tb);
}
